name: Repo sync (GitHub -> Codeberg)

on:
  push:
    branches:
      - 'opt'
  workflow_dispatch:

jobs:
  sync-repo-to-forgejo:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for a full history sync

      - name: "Gather facts"
        run: |
          echo "Repo variables:"
          echo "  PUSH_URL: ${{ vars.CODEBERG_URL }}"
          echo "  USERNAME: ${{ vars.CODEBERG_USERNAME }}"

      - name: "Sync repo"
        uses: yesolutions/mirror-action@master
        with:
          REMOTE: "${{ vars.CODEBERG_URL }}"
          GIT_USERNAME: ${{ vars.CODEBERG_USERNAME }}
          GIT_PASSWORD: ${{ secrets.CODEBERG_TOKEN }}
